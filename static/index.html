<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Storm Chase" />
  <link rel="manifest" href="/static/storm-chase.webmanifest" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
  <title>Storm Chase MVP — Tactile</title>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: rgba(10, 18, 32, 0.88);
      --panel-2: rgba(15, 23, 42, 0.96);
      --text: #e5eefc;
      --muted: #b7c7df;
      --border: rgba(255,255,255,0.11);
      --shadow: 0 12px 30px rgba(0,0,0,0.28);
      --accent: #3b82f6;
      --accent-2: rgba(59,130,246,0.18);
      --overlay-backdrop: rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
    body { overflow: hidden; }
    #app { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    #map { position: absolute; inset: 0; }

    .overlay {
      position: absolute;
      z-index: 10;
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .topbar {
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: min(720px, calc(100vw - 48px));
      border-radius: 18px;
      padding: 10px 12px;
      display: grid;
      gap: 8px;
    }

    .location-bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }

    .location-input {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 0 14px;
      font-size: 14px;
      outline: none;
    }

    .location-input::placeholder { color: #93a4c1; }
    .location-input:focus { border-color: rgba(59,130,246,0.6); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }

    .panel-card {
      display: grid;
      gap: 8px;
    }

    .mobile-toggle-bar {
      display: none;
      gap: 8px;
      justify-content: flex-start;
    }

    .mobile-toggle-btn,
    .icon-only-btn {
      min-width: 46px;
      width: 46px;
      height: 46px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-size: 0;
      line-height: 1;
    }

    .icon-svg {
      width: 20px;
      height: 20px;
      display: block;
      color: currentColor;
      pointer-events: none;
    }

    .mobile-toggle-btn {
      border-radius: 14px;
      background: rgba(10, 18, 32, 0.92);
    }

    .ghost-btn { background: rgba(255,255,255,0.06); }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    button {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      min-height: 42px;
      transition: background .15s ease, border-color .15s ease, transform .15s ease;
    }

    button:active { transform: scale(0.985); }
    button.active {
      background: rgba(59,130,246,0.95);
      border-color: rgba(255,255,255,0.28);
    }

    .statusbar {
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: min(360px, calc(100vw - 36px));
      border-radius: 18px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      align-items: center;
    }

    .meta-stack {
      position: absolute;
      z-index: 11;
      left: 12px;
      bottom: 12px;
      display: grid;
      gap: 6px;
      max-width: min(320px, calc(100vw - 24px));
    }

    .meta-corner {
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(10, 18, 32, 0.78);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      width: fit-content;
      max-width: 100%;
    }

    .title {
      font-size: 16px;
      font-weight: 800;
      margin: 0 0 8px;
    }

    .muted { color: var(--muted); }
    .small { font-size: 12px; }

    .kpis {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .kpi {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
    }

    .kpi .label { color: var(--muted); font-size: 11px; }
    .kpi .value { margin-top: 6px; font-size: 20px; font-weight: 800; }

    .legend-wrap {
      display: grid;
      gap: 6px;
    }

    .legend-gradient {
      height: 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: linear-gradient(
        90deg,
        rgb(37, 99, 235) 0%,
        rgb(34, 197, 94) 35%,
        rgb(245, 158, 11) 65%,
        rgb(239, 68, 68) 85%,
        rgb(239, 68, 68) 100%
      );
      overflow: hidden;
    }

    .legend-scale {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
      padding: 0 2px;
    }



    .selection-card {
      position: absolute;
      z-index: 16;
      left: 50%;
      bottom: 130px;
      transform: translateX(-50%);
      width: min(380px, calc(100vw - 36px));
      border-radius: 20px;
      padding: 16px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: none;
    }

    .selection-card.visible { display: block; }
    .selection-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .selection-title { font-size: 18px; font-weight: 800; margin: 0; }
    .selection-subtitle { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .icon-btn {
      min-width: 42px;
      width: 42px;
      height: 42px;
      padding: 0;
      border-radius: 999px;
      font-size: 18px;
      line-height: 1;
    }

    .hero-score {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .hero-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
    }
    .hero-box .label { font-size: 11px; color: var(--muted); }
    .hero-box .value { margin-top: 6px; font-size: 22px; font-weight: 800; }
    .hero-box .subvalue { margin-top: 4px; font-size: 13px; }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .quick-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      text-align: center;
    }
    .quick-item .label { font-size: 11px; color: var(--muted); }
    .quick-item .value { margin-top: 6px; font-size: 16px; font-weight: 800; }

    .summary-box {
      padding: 12px;
      border-radius: 14px;
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.2);
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .action-row button { flex: 1; }
    .primary-btn {
      background: rgba(59,130,246,0.95);
      border-color: rgba(255,255,255,0.28);
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      z-index: 20;
      background: var(--overlay-backdrop);
      backdrop-filter: blur(3px);
      display: none;
    }
    .modal-backdrop.visible { display: block; }

    .details-modal {
      position: absolute;
      z-index: 21;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(460px, calc(100vw - 36px));
      max-height: min(78vh, 760px);
      overflow: auto;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
      display: none;
    }
    .details-modal.visible { display: block; }
    .details-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .detail-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }
    .detail-item .label { font-size: 11px; color: var(--muted); }
    .detail-item .value { margin-top: 6px; font-size: 18px; font-weight: 800; }
    .detail-item .hint { margin-top: 4px; font-size: 12px; color: var(--muted); }

    .metric-btn {
      width: 100%;
      text-align: left;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      min-height: 0;
    }
    .metric-btn .label { font-size: 11px; color: var(--muted); display: block; }
    .metric-btn .value { margin-top: 6px; font-size: 15px; font-weight: 800; display: block; }
    .metric-value-positive { color: #4ade80; }
    .metric-value-negative { color: #f87171; }
    .metric-value-neutral { color: var(--text); }
    .metric-btn .hint { margin-top: 4px; font-size: 11px; color: var(--muted); display: block; }
    .metric-btn:hover, .metric-btn:focus-visible { background: rgba(59,130,246,0.10); border-color: rgba(59,130,246,0.45); }

    .info-modal {
      position: absolute;
      z-index: 22;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(400px, calc(100vw - 36px));
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
      display: none;
    }
    .info-modal.visible { display: block; }
    .info-modal p { color: var(--muted); font-size: 14px; line-height: 1.5; margin: 10px 0 0; }



    .fab-stack {
      position: absolute;
      z-index: 17;
      right: 12px;
      bottom: 110px;
      display: grid;
      gap: 10px;
    }
    .fab {
      width: 52px;
      height: 52px;
      min-width: 52px;
      padding: 0;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(10, 18, 32, 0.92);
      box-shadow: var(--shadow);
      font-size: 20px;
    }
    .fab.small-label {
      width: auto;
      min-width: 52px;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 800;
    }
    .floating-chip {
      position: absolute;
      z-index: 17;
      top: calc(166px + env(safe-area-inset-top));
      right: 12px;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(10, 18, 32, 0.92);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      font-size: 12px;
      color: var(--muted);
      backdrop-filter: blur(12px);
    }
    .floating-chip.visible { display: inline-flex; }

    .maplibregl-ctrl-top-right {
      top: 12px;
      right: 12px;
    }
    .grid-focus-corner {
      position: absolute;
      z-index: 16;
      top: 12px;
      right: 66px;
    }
    .grid-focus-btn {
      width: 46px;
      height: 46px;
      min-width: 46px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(10, 18, 32, 0.92);
      color: #e5edf9;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      display: inline-grid;
      place-items: center;
      cursor: pointer;
      transition: transform 120ms ease, background 160ms ease, border-color 160ms ease, color 160ms ease;
    }
    .grid-focus-btn:hover {
      background: rgba(17, 31, 54, 0.96);
    }
    .grid-focus-btn.active {
      background: rgba(37, 99, 235, 0.24);
      border-color: rgba(96, 165, 250, 0.52);
      color: #bfdbfe;
    }
    .grid-focus-btn:active { transform: scale(0.98); }
    .maplibregl-ctrl-group {
      border: 1px solid var(--border) !important;
      border-radius: 14px !important;
      overflow: hidden;
      background: rgba(10, 18, 32, 0.92) !important;
      box-shadow: var(--shadow) !important;
      backdrop-filter: blur(12px);
    }
    .maplibregl-ctrl-group button {
      width: 46px !important;
      height: 46px !important;
      min-width: 46px !important;
      min-height: 46px !important;
      background: transparent !important;
      border: 0 !important;
    }
    .maplibregl-ctrl-group button + button {
      border-top: 1px solid var(--border) !important;
    }
    .maplibregl-ctrl-group button span {
      filter: brightness(0) invert(1);
      opacity: 0.92;
    }
    .drag-handle {
      width: 44px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      margin: 0 auto 12px;
    }
    .topbar, .statusbar, .selection-card, .details-modal, .info-modal, .meta-corner {
      padding-top: calc(10px + env(safe-area-inset-top) * 0);
    }
    .statusbar {
      bottom: max(16px, env(safe-area-inset-bottom));
    }
    .meta-corner {
      bottom: max(12px, env(safe-area-inset-bottom));
    }
    .selection-card {
      bottom: calc(130px + env(safe-area-inset-bottom));
    }
    .touch-note {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    @keyframes loaderPulseGlow {
      0% { opacity: 0.52; }
      50% { opacity: 1; }
      100% { opacity: 0.52; }
    }

    @media (orientation: landscape) {
      body.mobile-ui .selection-card {
        width: min(360px, calc(100vw - 28px));
        bottom: calc(72px + env(safe-area-inset-bottom));
        border-radius: 20px;
      }
      body.mobile-ui .selection-card .drag-handle {
        display: none;
      }
      body.mobile-ui .details-modal,
      body.mobile-ui .info-modal {
        width: min(420px, calc(100vw - 28px));
        max-height: calc(100vh - 28px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      }
      body.mobile-ui .fab-stack {
        bottom: calc(96px + env(safe-area-inset-bottom));
      }
      body.mobile-ui .meta-stack {
        max-width: calc(100vw - 104px);
      }
    }

    @media (max-width: 900px) {
      .statusbar { width: min(420px, calc(100vw - 24px)); }
    }

    
    body.mobile-ui .topbar {
      top: max(8px, env(safe-area-inset-top));
      width: min(360px, calc(100vw - 28px));
      left: 50%;
      transform: translateX(-50%);
      padding: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
    }
    body.mobile-ui .mobile-toggle-bar {
      display: flex;
    }
    body.mobile-ui .topbar .panel-card {
      display: none;
      margin-top: 8px;
      padding: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }
    body.mobile-ui .topbar.show-search .search-panel,
    body.mobile-ui .topbar.show-calendar .calendar-panel {
      display: grid;
    }
    body.mobile-ui .topbar.show-search #toggleSearchBtn,
    body.mobile-ui .topbar.show-calendar #toggleCalendarBtn {
      background: rgba(59,130,246,0.95);
      border-color: rgba(255,255,255,0.28);
    }
    body.mobile-ui .location-bar {
      grid-template-columns: minmax(0, 1fr) auto auto;
    }
    body.mobile-ui .button-row {
      flex-wrap: nowrap;
      overflow-x: auto;
      justify-content: flex-start;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    body.mobile-ui .button-row::-webkit-scrollbar { display: none; }
    body.mobile-ui button { flex: 0 0 auto; min-width: 88px; min-height: 46px; }
    body.mobile-ui .icon-only-btn,
    body.mobile-ui .mobile-toggle-btn { min-width: 46px; width: 46px; }
    body.mobile-ui .statusbar {
      left: 50%;
      transform: translateX(-50%);
      width: min(320px, calc(100vw - 28px));
      bottom: max(8px, env(safe-area-inset-bottom));
    }
    body.mobile-ui .meta-stack {
      left: 8px;
      max-width: calc(100vw - 92px);
      bottom: calc(72px + env(safe-area-inset-bottom));
    }
    body.mobile-ui .selection-card {
      left: 50%;
      right: auto;
      transform: translateX(-50%);
      width: min(360px, calc(100vw - 28px));
      bottom: calc(84px + env(safe-area-inset-bottom));
      border-radius: 20px;
      max-height: none;
      overflow: visible;
      padding: 14px;
    }
    body.mobile-ui .hero-score {
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    body.mobile-ui .quick-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    body.mobile-ui .details-grid {
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    body.mobile-ui .action-row {
      flex-direction: column;
    }
    body.mobile-ui .metric-btn {
      padding: 10px;
      border-radius: 12px;
    }
    body.mobile-ui .metric-btn .label {
      font-size: 10px;
    }
    body.mobile-ui .metric-btn .value {
      font-size: 13px;
      margin-top: 4px;
    }
    body.mobile-ui .metric-btn .hint {
      font-size: 10px;
      margin-top: 3px;
    }
    body.mobile-ui .details-modal,
    body.mobile-ui .info-modal {
      width: min(400px, calc(100vw - 28px));
      max-height: calc(100vh - 20px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      padding: 14px;
      top: calc(10px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      border-radius: 24px;
    }
    body.mobile-ui .fab-stack {
      right: 6px;
      bottom: calc(148px + env(safe-area-inset-bottom));
    }
    body.mobile-ui .fab { width: 48px; height: 48px; min-width: 48px; }
    body.mobile-ui .grid-focus-corner {
      top: calc(12px + env(safe-area-inset-top));
      right: 66px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <div class="grid-focus-corner">
      <button id="bestCellsBtn" class="grid-focus-btn" type="button" aria-label="Mettre en valeur les meilleures cellules" title="Mettre en valeur les meilleures cellules">
        <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3.5 14.6 8.8 20.5 9.7 16.2 13.8 17.2 19.6 12 16.9 6.8 19.6 7.8 13.8 3.5 9.7 9.4 8.8Z"></path>
        </svg>
      </button>
    </div>

    <div class="overlay topbar" id="topbar">
      <div class="mobile-toggle-bar">
        <button id="toggleCalendarBtn" class="mobile-toggle-btn" type="button" aria-label="Afficher les jours et horaires" title="Jours et horaires">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4.5" width="18" height="16" rx="2.5"></rect>
            <line x1="8" y1="2.5" x2="8" y2="7"></line>
            <line x1="16" y1="2.5" x2="16" y2="7"></line>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="8" y1="13" x2="8" y2="13"></line>
            <line x1="12" y1="13" x2="12" y2="13"></line>
            <line x1="16" y1="13" x2="16" y2="13"></line>
          </svg>
        </button>
        <button id="toggleSearchBtn" class="mobile-toggle-btn" type="button" aria-label="Afficher la recherche de zone" title="Zone et recherche">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 21s-6-5.2-6-10a6 6 0 1 1 12 0c0 4.8-6 10-6 10Z"></path>
            <circle cx="12" cy="11" r="2.5"></circle>
          </svg>
        </button>
      </div>

      <div class="panel-card search-panel">
        <div class="location-bar">
          <input id="cityInput" class="location-input" type="text" placeholder="Nom de ville…" autocomplete="off" spellcheck="false" />
          <button id="searchCityBtn" class="icon-only-btn" aria-label="Rechercher une ville" title="Rechercher">

    function colorFromScore(score) {
      const s = Math.max(0, Math.min(100, Number(score) || 0));
      const stops = [
        { at: 0, c: [37, 99, 235] },
        { at: 35, c: [34, 197, 94] },
        { at: 65, c: [245, 158, 11] },
        { at: 85, c: [239, 68, 68] },
      ];
      let a = stops[0], b = stops[1];
      if (s >= 65) { a = stops[2]; b = stops[3]; }
      else if (s >= 35) { a = stops[1]; b = stops[2]; }
      const t = (s - a.at) / Math.max(1, (b.at - a.at));
      const r = Math.round(a.c[0] + (b.c[0] - a.c[0]) * t);
      const g = Math.round(a.c[1] + (b.c[1] - a.c[1]) * t);
      const b2 = Math.round(a.c[2] + (b.c[2] - a.c[2]) * t);
      return `rgb(${r}, ${g}, ${b2})`;
    }

    function opacityFromConfidence(confidence) {
      const c = Math.max(0, Math.min(100, Number(confidence) || 0));
      return 0.12 + (c / 100) * 0.48;

    function getDays() {

    function sanitizeCenter(center) {
      const lat = Number(center?.lat);

      if (!Number.isFinite(lat) || !Number.isFinite(lon) || !label) return { ...DEFAULT_CENTER };
      return { lat, lon, label };
    }

    function loadStoredCenter() {
      try {
        const raw = localStorage.getItem('storm_center');
        if (!raw) return { ...DEFAULT_CENTER };
        return sanitizeCenter(JSON.parse(raw));
      } catch (_) {
        return { ...DEFAULT_CENTER };
      }
    }

    function saveCurrentCenter() {

    function isMobileLayout() {
      return document.body.classList.contains('mobile-ui');

    function applyResponsiveMode() {
      const coarsePointer = window.matchMedia('(hover: none) and (pointer: coarse)').matches || navigator.maxTouchPoints > 1;

      const mobileLike = coarsePointer || smallViewport;
      document.body.classList.toggle('mobile-ui', mobileLike);

      const calendarOpen = topbar.classList.contains('show-calendar');
      closeTopPanels();
      if (panel === 'search' && !searchOpen) topbar.classList.add('show-search');
      if (panel === 'calendar' && !calendarOpen) topbar.classList.add('show-calendar');
    }

    function formatFrenchRun(dateString) {
      if (!dateString) return '—';
      const parsed = new Date(dateString);
      if (Number.isNaN(parsed.getTime())) return String(dateString);
      const formatted = new Intl.DateTimeFormat('fr-FR', {
        timeZone: 'Europe/Paris', year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', hour12: false
      }).format(parsed).replace(',', '');
      const tzPart = new Intl.DateTimeFormat('fr-FR', {
        timeZone: 'Europe/Paris', timeZoneName: 'shortOffset', hour: '2-digit'
      }).formatToParts(parsed).find(part => part.type === 'timeZoneName')?.value || 'GMT+2';
      return `${formatted} ${tzPart}`;
    }

    function updateMetaLine() {
      const centerLabel = payload?.meta?.center?.label || currentCenter.label || 'Zone';

    function showCurrentMarker(lon, lat) {
      const lngLat = [lon, lat];
      if (!userLocationMarker) {
        const el = document.createElement('div');
        el.style.width = '16px';
        el.style.height = '16px';

        userLocationMarker.setLngLat(lngLat);
      }
    }


    function haversineKm(a, b) {
      const toRad = (deg) => (deg * Math.PI) / 180;
      const R = 6371;
      const dLat = toRad(b.lat - a.lat);
      const dLon = toRad(b.lon - a.lon);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.min(1, Math.sqrt(h)));
    }

    function targetZoomForDistance(distanceKm) {
      if (distanceKm > 900) return 5.8;
      if (distanceKm > 600) return 6.2;
      if (distanceKm > 350) return 6.7;
      if (distanceKm > 180) return 7.1;
      if (distanceKm > 90) return 7.5;
      if (distanceKm > 40) return 7.9;
      return 8.3;
    }

    function minZoomForDistance(distanceKm, targetZoom) {
      const drop = distanceKm > 700 ? 0.95 : distanceKm > 300 ? 0.8 : distanceKm > 120 ? 0.65 : distanceKm > 50 ? 0.5 : 0.35;
      return Math.max(5.2, targetZoom - drop);
    }

    function durationForDistance(distanceKm) {
      return Math.max(18000, Math.min(36000, 17000 + distanceKm * 24));
    }

    function animateCameraToCenter(center, zoomOverride = null) {
      const current = map.getCenter();
      const from = { lat: current.lat, lon: current.lng };
      const to = { lat: center.lat, lon: center.lon };
      const distanceKm = haversineKm(from, to);
      const targetZoom = Number.isFinite(zoomOverride) ? zoomOverride : targetZoomForDistance(distanceKm);
      map.flyTo({
        center: [center.lon, center.lat],
        zoom: targetZoom,
        minZoom: minZoomForDistance(distanceKm, targetZoom),
        speed: 0.05,
        curve: 1.0,
        essential: true,
        duration: durationForDistance(distanceKm)
      });
    }

    function stopLoaderPulse() {
      if (loaderPulseFrame !== null) {
        cancelAnimationFrame(loaderPulseFrame);
        loaderPulseFrame = null;
      }
      loaderPulseStart = 0;
      if (map.getLayer('grid-loader-fill')) {
        map.setPaintProperty('grid-loader-fill', 'fill-opacity', 0.10);
      }
      if (map.getLayer('grid-loader-outline')) {
        map.setPaintProperty('grid-loader-outline', 'line-opacity', 0.26);
      }
    }

    function startLoaderPulse() {
      stopLoaderPulse();
      if (!map.getLayer('grid-loader-fill')) return;
      loaderPulseStart = performance.now();
      const tick = (now) => {
        if (!map.getLayer('grid-loader-fill')) {
          stopLoaderPulse();
          return;
        }
        const t = (now - loaderPulseStart) / 1000;
        const wave = (Math.sin(t * Math.PI * 1.25) + 1) / 2;
        const fillOpacity = 0.05 + wave * 0.04;
        const lineOpacity = 0.16 + wave * 0.08;
        map.setPaintProperty('grid-loader-fill', 'fill-opacity', fillOpacity);
        map.setPaintProperty('grid-loader-outline', 'line-opacity', lineOpacity);
        loaderPulseFrame = requestAnimationFrame(tick);
      };
      loaderPulseFrame = requestAnimationFrame(tick);
    }

    async function geocodeCity(query) {
      const q = query.trim();
      if (!q) throw new Error('Ville vide');
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=fr&format=json`;
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error(`Geocoding HTTP ${response.status}`);
      const data = await response.json();
      const first = data?.results?.[0];
      if (!first) throw new Error('Aucun résultat');
      const labelParts = [first.name, first.admin1, first.country].filter(Boolean);
      return { lat: Number(first.latitude), lon: Number(first.longitude), label: labelParts.join(', ') || first.name };
    }

    async function applyCenter(center, options = {}) {
      currentCenter = sanitizeCenter(center);
      saveCurrentCenter();
      cityInput.value = currentCenter.label;
      selectedFeature = null;
      closeSelection();
      closeDetails();
      animateCameraToCenter(currentCenter, Number.isFinite(options.zoom) ? options.zoom : null);
      showLoadingGrid(currentCenter);
      if (options.showMarker) showCurrentMarker(currentCenter.lon, currentCenter.lat);

      await loadData(options.force === true);

    function renderDayButtons() {
      const days = getDays();
      dayButtons.innerHTML = '';
      if (!days.length) return;
      if (!selectedDayKey || !days.some(d => d.day_key === selectedDayKey)) selectedDayKey = days[0].day_key;

        const btn = document.createElement('button');

        btn.className = day.day_key === selectedDayKey ? 'active' : '';

          closeSelection();
          closeDetails();
          renderDayButtons();
          renderSlotButtons();
          refreshMap();

        dayButtons.appendChild(btn);

    function renderSlotButtons() {

    function kmToDegLat(km) {
      return km / 111;
    }

    function kmToDegLon(km, lat) {
      return km / (111 * Math.cos((lat * Math.PI) / 180));
    }

    function buildLoaderCells(center) {
      const cells = [];
      const latStep = kmToDegLat(LOADER_CELL_SIZE_KM);
      const lonStep = kmToDegLon(LOADER_CELL_SIZE_KM, center.lat);
      const half = Math.floor(LOADER_GRID_SIZE / 2);
      let idx = 0;
      for (let row = -half; row <= half; row += 1) {
        for (let col = -half; col <= half; col += 1) {
          cells.push({
            zone: `loader-${idx++}`,
            lat: center.lat + row * latStep,
            lon: center.lon + col * lonStep,
            cell_height_deg: latStep,
            cell_width_deg: lonStep,
            score_global: 18 + ((row + half + col + half) % 5) * 5,
            confidence_score: 42,
            chase_quality_score: 55,
            is_loader: true,
          });
        }
      }
      return cells;
    }

    function buildLoaderGeoJSON(center) {
      return buildGeoJSON(buildLoaderCells(center));
    }

    function computeBestZoneSet(cells) {
      const ranked = [...cells].sort((a, b) => {
        const scoreDiff = Number(b.score_global || 0) - Number(a.score_global || 0);
        if (Math.abs(scoreDiff) > 0.001) return scoreDiff;
        return Number(b.confidence_score || 0) - Number(a.confidence_score || 0);
      });
      if (!ranked.length) return new Set();
      const topCount = Math.max(3, Math.min(10, Math.ceil(ranked.length * 0.12)));
      const strong = ranked.filter(cell => Number(cell.score_global || 0) >= 70 || (Number(cell.score_global || 0) >= 62 && Number(cell.confidence_score || 0) >= 62));
      const picked = strong.length ? strong.slice(0, Math.max(topCount, Math.min(12, strong.length))) : ranked.slice(0, topCount);
      return new Set(picked.map(cell => cell.zone));
    }

    function buildGeoJSON(cells) {
      const bestZones = computeBestZoneSet(cells);
      return {
        type: 'FeatureCollection',
        features: cells.map(cell => {
          const baseOpacity = opacityFromConfidence(cell.confidence_score);
          const isBest = bestZones.has(cell.zone);
          const fillOpacity = bestCellsMode && !cell.is_loader
            ? (isBest ? Math.min(0.84, baseOpacity + 0.1) : Math.max(0.045, baseOpacity * 0.22))
            : baseOpacity;
          return {
            type: 'Feature',
            geometry: {
              type: 'Polygon',
              coordinates: [[
                [cell.lon - cell.cell_width_deg / 2, cell.lat - cell.cell_height_deg / 2],
                [cell.lon + cell.cell_width_deg / 2, cell.lat - cell.cell_height_deg / 2],
                [cell.lon + cell.cell_width_deg / 2, cell.lat + cell.cell_height_deg / 2],
                [cell.lon - cell.cell_width_deg / 2, cell.lat + cell.cell_height_deg / 2],
                [cell.lon - cell.cell_width_deg / 2, cell.lat - cell.cell_height_deg / 2],
              ]],
            },
            properties: {
              ...cell,
              is_best: isBest ? 1 : 0,
              fill_color: colorFromScore(cell.score_global),
              fill_opacity: fillOpacity,
            },
          };
        }),
      };
    }

    function sortCellsForReveal(cells) {
      return [...cells].sort((a, b) => {
        const latDiff = Number(b.lat) - Number(a.lat);
        if (Math.abs(latDiff) > 0.0001) return latDiff;
        return Number(a.lon) - Number(b.lon);
      });
    }

    function animateRevealToSource(sourceId, cells, geojsonBuilder = buildGeoJSON, onStep = null) {
      const token = ++gridAnimationToken;
      const orderedCells = sortCellsForReveal(cells);
      const source = map.getSource(sourceId);
      if (!source) return;

      source.setData(geojsonBuilder([]));

      const step = (count) => {
        if (token !== gridAnimationToken) return;
        const nextCount = Math.min(count + GRID_ANIMATION_BATCH_SIZE, orderedCells.length);
        source.setData(geojsonBuilder(orderedCells.slice(0, nextCount)));
        if (typeof onStep === 'function') onStep();
        if (nextCount < orderedCells.length) {
          window.setTimeout(() => step(nextCount), GRID_ANIMATION_STEP_MS);
        }
      };

      step(0);
    }

    function animateGridReveal(cells) {
      animateRevealToSource('grid', cells, buildGeoJSON, updateHighlight);
    }

    function ensureSource(id, data) {
      if (map.getSource(id)) map.getSource(id).setData(data);
      else map.addSource(id, { type: 'geojson', data });
    }

    function removeLoaderLayers() {
      gridAnimationToken += 1;
      stopLoaderPulse();
      if (map.getLayer('grid-loader-outline')) map.removeLayer('grid-loader-outline');
      if (map.getLayer('grid-loader-fill')) map.removeLayer('grid-loader-fill');
      if (map.getSource('grid-loader')) map.removeSource('grid-loader');
    }

    function showLoadingGrid(center) {
      if (!map.isStyleLoaded()) return;
      removeLoaderLayers();
      const cells = buildLoaderCells(center);
      ensureSource('grid-loader', buildGeoJSON(cells));
      map.addLayer({
        id: 'grid-loader-fill',
        type: 'fill',
        source: 'grid-loader',
        paint: {
          'fill-color': '#7dd3fc',
          'fill-opacity': 0.08,
        }
      });
      map.addLayer({
        id: 'grid-loader-outline',
        type: 'line',
        source: 'grid-loader',
        paint: {
          'line-color': 'rgba(191,219,254,0.75)',
          'line-width': 1,
          'line-opacity': 0.24,
        }
      });
      animateRevealToSource('grid-loader', cells, buildGeoJSON, startLoaderPulse);
    }

    function removeLayers() {
      gridAnimationToken += 1;
      removeLoaderLayers();
      if (map.getLayer('grid-highlight')) map.removeLayer('grid-highlight');
      if (map.getLayer('grid-best-outline')) map.removeLayer('grid-best-outline');
      if (map.getLayer('grid-outline')) map.removeLayer('grid-outline');
      if (map.getLayer('grid-fill')) map.removeLayer('grid-fill');
      if (map.getSource('grid')) map.removeSource('grid');
      map.off('click', 'grid-fill', onGridClick);
      map.off('mouseenter', 'grid-fill', onGridEnter);
      map.off('mouseleave', 'grid-fill', onGridLeave);
    }

    function addLayers(data) {
      removeLoaderLayers();
      ensureSource('grid', data);
      map.addLayer({
        id: 'grid-fill',
        type: 'fill',
        source: 'grid',
        paint: {
          'fill-color': ['get', 'fill_color'],
          'fill-opacity': ['get', 'fill_opacity'],
        }
      });
      map.addLayer({
        id: 'grid-outline',
        type: 'line',
        source: 'grid',
        paint: {
          'line-color': ['case', ['>=', ['get', 'chase_quality_score'], 70], '#dbeafe', ['>=', ['get', 'chase_quality_score'], 50], '#fde68a', '#fca5a5'],
          'line-width': ['case', ['==', ['get', 'is_best'], 1], 2.2, ['>=', ['get', 'score_global'], 70], 1.6, ['>=', ['get', 'score_global'], 45], 1.2, 0.8],
          'line-opacity': ['case', ['==', ['get', 'is_best'], 1], 0.95, 0.5],
        }
      });
      map.addLayer({
        id: 'grid-best-outline',
        type: 'line',
        source: 'grid',
        filter: ['==', ['get', 'is_best'], 1],
        paint: {
          'line-color': '#ffffff',
          'line-width': 2.8,
          'line-opacity': bestCellsMode ? 0.68 : 0,
          'line-blur': 0.25,
        }
      });
      map.addLayer({
        id: 'grid-highlight',
        type: 'line',
        source: 'grid',
        paint: {
          'line-color': '#ffffff',
          'line-width': 2.6,
          'line-opacity': ['case', ['==', ['get', 'zone'], selectedFeature?.zone || ''], 1, 0],
        }
      });

      map.on('click', 'grid-fill', onGridClick);
      map.on('mouseenter', 'grid-fill', onGridEnter);
      map.on('mouseleave', 'grid-fill', onGridLeave);
    }

    function onGridEnter() {
      map.getCanvas().style.cursor = 'pointer';
    }

    function onGridLeave() {
      map.getCanvas().style.cursor = '';
    }

    function onGridClick(e) {
      const p = e.features?.[0]?.properties;
      if (!p) return;
      selectedFeature = p;
      showSelection(p);
      updateHighlight();
    }

    function updateHighlight() {
      if (!map.getLayer('grid-highlight')) return;
      map.setPaintProperty('grid-highlight', 'line-opacity', ['case', ['==', ['get', 'zone'], selectedFeature?.zone || ''], 1, 0]);
    }

    function updateBestCellsButton() {
      if (!bestCellsBtn) return;
      bestCellsBtn.classList.toggle('active', bestCellsMode);
    }

    function applyBestCellsModeToCurrentMap() {
      const slot = getCurrentSlot();
      const cells = slot?.cells || [];
      if (!map.isStyleLoaded() || !map.getSource('grid') || !cells.length) {
        updateBestCellsButton();
        return;
      }
      map.getSource('grid').setData(buildGeoJSON(cells));
      if (map.getLayer('grid-best-outline')) {
        map.setPaintProperty('grid-best-outline', 'line-opacity', bestCellsMode ? 0.68 : 0);
      }
      updateHighlight();
      updateBestCellsButton();
    }

    function toggleBestCellsMode() {
      bestCellsMode = !bestCellsMode;
      applyBestCellsModeToCurrentMap();
    }

    function mean(values) {
      if (!values.length) return 0;
      return Math.round(values.reduce((a, b) => a + b, 0) / values.length);
    }

    function refreshStats(cells, slot) {
      return { cells, slot };
    }

    function refreshMap() {
      const slot = getCurrentSlot();
      const cells = slot?.cells || [];
      refreshStats(cells, slot);
      if (!map.isStyleLoaded()) return;
      removeLayers();
      if (!cells.length) {
        return;
      }
      addLayers(buildGeoJSON(cells));
      animateGridReveal(cells);
    }

    function metricTone(metricKey, rawValue) {
      const value = Number(rawValue);
      if (!Number.isFinite(value)) return 'neutral';
      switch (metricKey) {
        case 'score_global':
        case 'confidence_score':
        case 'trigger_score':
        case 'structure_score':
        case 'chase_quality_score':
          return value >= 60 ? 'positive' : value <= 35 ? 'negative' : 'neutral';
        case 'mucape':
          return value >= 800 ? 'positive' : value < 300 ? 'negative' : 'neutral';
        case 'shear_ms':
          return value >= 14 ? 'positive' : value < 8 ? 'negative' : 'neutral';
        case 'relative_humidity_2m':
          return value >= 65 ? 'positive' : value < 45 ? 'negative' : 'neutral';
        case 'vapour_pressure_deficit':
          return value <= 1.5 ? 'positive' : value > 2.2 ? 'negative' : 'neutral';
        case 'wet_bulb_temperature_2m':
          return value >= 15 ? 'positive' : value < 10 ? 'negative' : 'neutral';
        case 'dewpoint_c':
          return value >= 15 ? 'positive' : value < 10 ? 'negative' : 'neutral';
        case 'temp_c':
          return value >= 20 && value <= 30 ? 'positive' : value < 15 || value > 34 ? 'negative' : 'neutral';
        case 'wind_gusts_10m':
          return value >= 12 ? 'positive' : value < 6 ? 'negative' : 'neutral';
        case 'cloud_cover_low':
        case 'cloud_cover_mid':
          return value <= 55 ? 'positive' : value > 75 ? 'negative' : 'neutral';
        case 'cloud_cover_high':
          return value <= 70 ? 'positive' : value >= 90 ? 'negative' : 'neutral';
        default:
          return 'neutral';
      }
    }

    function applyMetricTone(element, metricKey, rawValue) {
      if (!element) return;
      element.classList.remove('metric-value-positive', 'metric-value-negative', 'metric-value-neutral');
      const tone = metricTone(metricKey, rawValue);
      element.classList.add(`metric-value-${tone}`);
    }

      dRh.textContent = safe(p.relative_humidity_2m, ' %');
      dVpd.textContent = safe(p.vapour_pressure_deficit);
      dWetbulb.textContent = safe(p.wet_bulb_temperature_2m, ' °C');
      dDewpoint.textContent = safe(p.dewpoint_c, ' °C');
      dTemp.textContent = safe(p.temp_c, ' °C');
      dGusts.textContent = safe(p.wind_gusts_10m, ' m/s');
      dCloudLow.textContent = safe(p.cloud_cover_low, ' %');
      dCloudMid.textContent = safe(p.cloud_cover_mid, ' %');
      dCloudHigh.textContent = safe(p.cloud_cover_high, ' %');
      dHour.textContent = safe(p.selected_hour);
      applyMetricTone(dCape, 'mucape', p.mucape);
      applyMetricTone(dShear, 'shear_ms', p.shear_ms);
      applyMetricTone(dRh, 'relative_humidity_2m', p.relative_humidity_2m);
      applyMetricTone(dVpd, 'vapour_pressure_deficit', p.vapour_pressure_deficit);
      applyMetricTone(dWetbulb, 'wet_bulb_temperature_2m', p.wet_bulb_temperature_2m);
      applyMetricTone(dDewpoint, 'dewpoint_c', p.dewpoint_c);
      applyMetricTone(dTemp, 'temp_c', p.temp_c);
      applyMetricTone(dGusts, 'wind_gusts_10m', p.wind_gusts_10m);
      applyMetricTone(dCloudLow, 'cloud_cover_low', p.cloud_cover_low);
      applyMetricTone(dCloudMid, 'cloud_cover_mid', p.cloud_cover_mid);
      applyMetricTone(dCloudHigh, 'cloud_cover_high', p.cloud_cover_high);
      applyMetricTone(dHour, 'selected_hour', NaN);
      modalBackdrop.classList.add('visible');
      detailsModal.classList.add('visible');
    }

    function closeDetails() {
      modalBackdrop.classList.remove('visible');
      detailsModal.classList.remove('visible');
    }


    function updateInstallUI() {
      const installable = !!deferredInstallPrompt;
      installBtn.style.display = installable ? 'inline-grid' : 'none';
      installChip.classList.toggle('visible', installable);
    }

    async function installApp() {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      try { await deferredInstallPrompt.userChoice; } catch (_) {}
      deferredInstallPrompt = null;
      updateInstallUI();
    }

    function locateUser() {
      if (!navigator.geolocation) {
        setMetaMessage('Géolocalisation non disponible sur cet appareil.');
        return;
      }
      setLoadingState(true, 'Recherche de votre position…');
      navigator.geolocation.getCurrentPosition(
        async ({ coords }) => {
          try {
            await applyCenter({ lat: coords.latitude, lon: coords.longitude, label: 'Autour de moi' }, { showMarker: true, zoom: 8.8 });
          } catch (error) {
            console.warn(error);
            setMetaMessage('Impossible de recalculer la zone autour de vous.');
          } finally {
            setLoadingState(false);
          }
        },
        () => {
          setMetaMessage('Position refusée ou indisponible.');
          setLoadingState(false);
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
      );
    }

    function registerPWA() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
      window.addEventListener('beforeinstallprompt', (event) => {
        event.preventDefault();
        deferredInstallPrompt = event;
        updateInstallUI();
      });
      window.addEventListener('appinstalled', () => {
        deferredInstallPrompt = null;
        updateInstallUI();
      });
      updateInstallUI();
    }

    async function loadData(force = false) {
      const signature = `${currentCenter.lat}|${currentCenter.lon}|${currentCenter.label}`;
      if (isFetchingData) return payload;
      if (!force && payload && signature === lastFetchSignature) return payload;

      isFetchingData = true;
      const params = new URLSearchParams({
        lat: String(currentCenter.lat),
        lon: String(currentCenter.lon),
        label: currentCenter.label,
      });
      if (force) params.set('force', 'true');
      try {
        const response = await fetch(`/api/latest?${params.toString()}`, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        payload = await response.json();
        lastFetchSignature = signature;
        lastFetchAt = Date.now();
        const days = getDays();
        selectedDayKey = days.find(d => d.day_key === selectedDayKey)?.day_key || days[0]?.day_key || null;
        const currentDay = getCurrentDay();
        selectedSlotKey = currentDay?.slots?.find(s => s.slot_key === selectedSlotKey)?.slot_key || currentDay?.slots?.[0]?.slot_key || null;
        cityInput.value = payload?.meta?.center?.label || currentCenter.label;
        currentCenter = sanitizeCenter(payload?.meta?.center || currentCenter);
        saveCurrentCenter();
        updateMetaLine();
        renderDayButtons();
        renderSlotButtons();
        refreshMap();
        return payload;
      } finally {
        isFetchingData = false;
      }
    }

    async function refreshCurrentData(force = true, loadingMessage = 'Actualisation…') {
      setLoadingState(true, loadingMessage);
      try {
        await loadData(force);
      } catch (err) {
        console.warn(err);
        setMetaMessage('Impossible d’actualiser la zone courante.');
      } finally {
        setLoadingState(false);
      }
    }

    function maybeRefreshOnReturn() {
      if (document.visibilityState !== 'visible') return;
      const isStale = !lastFetchAt || (Date.now() - lastFetchAt) >= VISIBILITY_REFRESH_MS;
      if (!isStale) return;
      refreshCurrentData(false, 'Vérification des données…');
    }

    async function handleCitySearch() {
      const query = cityInput.value.trim();
      if (!query) {
        setMetaMessage('Saisissez une ville avant de lancer la recherche.');
        return;
      }
      setLoadingState(true, `Recherche de ${query}…`);
      try {
        const target = await geocodeCity(query);
        await applyCenter(target, { zoom: 8.6 });
      } catch (error) {
        console.warn(error);
        setMetaMessage('Ville introuvable ou service indisponible.');
      } finally {
        setLoadingState(false);
      }
    }

    toggleCalendarBtn.addEventListener('click', () => toggleTopPanel('calendar'));
    toggleSearchBtn.addEventListener('click', () => toggleTopPanel('search'));
    closeSelectionBtn.addEventListener('click', closeSelection);
    openDetailsBtn.addEventListener('click', openDetails);
    recenterBtn.addEventListener('click', () => {
      if (!selectedFeature) return;
      map.easeTo({ center: [Number(selectedFeature.lon), Number(selectedFeature.lat)], duration: 700, zoom: Math.max(map.getZoom(), 10.2) });
    });
    closeDetailsBtn.addEventListener('click', closeDetails);
    modalBackdrop.addEventListener('click', closeDetails);
    closeInfoBtn.addEventListener('click', closeMetricInfo);
    infoBackdrop.addEventListener('click', closeMetricInfo);
    locateBtn.addEventListener('click', locateUser);
    refreshBtn.addEventListener('click', () => refreshCurrentData(true));
    bestCellsBtn.addEventListener('click', toggleBestCellsMode);
    aroundMeBtn.addEventListener('click', locateUser);
    searchCityBtn.addEventListener('click', handleCitySearch);
    cityInput.addEventListener('keydown', (event) => { if (event.key === 'Enter') handleCitySearch(); });
    installBtn.addEventListener('click', installApp);
    installChip.addEventListener('click', installApp);
    window.addEventListener('resize', () => { if (!isMobileLayout()) closeTopPanels(); });
    document.addEventListener('visibilitychange', maybeRefreshOnReturn);
    updateBestCellsButton();

    document.querySelectorAll('[data-metric]').forEach(btn => {
      btn.addEventListener('click', () => {
        const metricKey = btn.dataset.metric;
        const valueEl = btn.querySelector('.value');
        openMetricInfo(metricKey, valueEl?.textContent?.trim() || '—');
      });
    });

    map.on('click', (e) => {
      const features = map.queryRenderedFeatures(e.point, { layers: ['grid-fill'] });
      if (!features.length && !detailsModal.classList.contains('visible')) closeSelection();
      if (!features.length) closeTopPanels();
    });

    registerPWA();

    map.on('load', async () => {
      cityInput.value = currentCenter.label;
      await loadData().catch(err => {
        console.warn(err);
        setMetaMessage('Impossible de charger la zone initiale.');
      });
    });
  </script>
</body>
</html>
